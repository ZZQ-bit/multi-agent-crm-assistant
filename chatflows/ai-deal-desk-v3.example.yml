    - data:
        code: "def _as_list(value):\n    if value is None:\n        return []\n    if isinstance(value, list):\n        return value\n    return [value]\n\n\ndef _get(item, key):\n    if isinstance(item, dict):\n        return item.get(key)\n    return getattr(item, key, None)\n\n\ndef _is_image(item):\n    file_type = str(_get(item, 'type') or _get(item, 'mime_type') or _get(item, 'mime') or '').lower()\n    name = str(_get(item, 'name') or _get(item, 'filename') or '').lower()\n    image_exts = ('.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg')\n    return file_type == 'image' or file_type.startswith('image/') or name.endswith(image_exts)\n\n\ndef main(uploaded_files=None) -> dict:\n    files = _as_list(uploaded_files)\n    images = [item for item in files if _is_image(item)]\n    return {\n        'has_images': 'true' if images else 'false',\n        'image_count': str(len(images)),\n    }\n"
