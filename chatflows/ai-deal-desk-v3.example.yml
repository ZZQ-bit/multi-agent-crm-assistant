    - data:
        code: "\nimport json\nimport re\n\n\ndef _clean(value):\n    if value is None:\n\
          \        return ''\n    return str(value).strip()\n\n\ndef _strip_think(text):\n\
          \    return re.sub(r'<think>.*?</think>', '', _clean(text), flags=re.S).strip()\n\
          \n\ndef _loads(value, fallback):\n    if isinstance(value, (dict, list)):\n\
          \        return value\n    text = _clean(value)\n    if not text:\n    \
          \    return fallback\n    try:\n        return json.loads(text)\n    except\
          \ Exception:\n        return fallback\n\n\ndef _normalize_bound_object(value):\n\
          \    if not isinstance(value, dict):\n        return {}\n    object_type\
          \ = _clean(value.get('objectType') or value.get('object_type') or value.get('type'))\n\
          \    object_id = _clean(value.get('objectId') or value.get('object_id')\
          \ or value.get('id'))\n    if not object_type or not object_id:\n      \
          \  return {}\n    bound = {\n        'objectType': object_type,\n      \
          \  'objectId': object_id,\n        'objectName': _clean(value.get('objectName')\
          \ or value.get('object_name') or value.get('name')),\n    }\n    optional_fields\
          \ = {\n        'source': value.get('source'),\n        'customerId': value.get('customerId')\
          \ or value.get('customer_id'),\n        'customerName': value.get('customerName')\
          \ or value.get('customer_name'),\n        'relationTarget': value.get('relationTarget')\
          \ or value.get('relation_target'),\n    }\n    for key, raw_value in optional_fields.items():\n\
          \        cleaned = _clean(raw_value)\n        if cleaned:\n            bound[key]\
          \ = cleaned\n    return bound\n\n\ndef _expects_chart(query):\n    text\
          \ = _clean(query).lower()\n    return any(word in text for word in [\n \
          \       '图表', '图形', '画图', '可视化', '漏斗图', '漏斗', '柱状图', '折线图', '饼图',\n    \
          \    'chart', 'funnel', 'bar chart', 'visualize',\n    ])\n\n\ndef _remove_plain_chart_fences(answer):\n\
          \    text = _clean(answer)\n    pattern = r'```(?:text|txt|plain)?\\s*\\\
          n(?=[\\s\\S]{0,1200}(?:漏斗|需求确认|方案评审|商务沟通|合同推进|赢单预测))[\\s\\S]*?```'\n   \
          \ return re.sub(pattern, '', text, flags=re.I).strip()\n\n\ndef _turn_type(task_type,\
          \ resolution_status):\n    mapping = {\n        'general_chat': 'quick_answer',\n\
          \        'image_answer': 'quick_answer',\n        'progress_summary': 'text_analysis',\n\
          \        'sales_assist': 'text_analysis',\n        'finance_check': 'text_analysis',\n\
          \        'delivery_check': 'text_analysis',\n        'legal_check': 'text_analysis',\n\
          \        'full_review': 'deep_deal_review_brief',\n        'stats_analysis':\
          \ 'stats_query',\n        'content_draft': 'text_analysis',\n        'followup_plan':\
          \ 'text_analysis',\n        'external_research': 'text_analysis',\n    }\n\
          \    normalized = _clean(task_type)\n    if normalized == 'object_query':\n\
          \        unresolved = _clean(resolution_status).lower() in ['ambiguous',\
          \ 'missing', 'not_found']\n        return 'object_select' if unresolved\
          \ else 'quick_answer'\n    return mapping.get(normalized, 'text_analysis')\n\
          \n\ndef main(\n    direct_answer: str = '',\n    gap_answer: str = '',\n\
          \    crm_light_answer: str = '',\n    task_type: str = '',\n    resolution_status:\
          \ str = '',\n    target_object_json: str = '',\n    original_query: str\
          \ = '',\n    chart_blocks_text: str = '',\n) -> dict:\n    answer = _strip_think(direct_answer)\
          \ or _strip_think(crm_light_answer) or _strip_think(gap_answer)\n    if\
          \ not answer:\n        answer = '我还没有拿到足够信息来回答这个问题。请补充客户、商机或你希望我分析的具体内容。'\n\
          \    chart_blocks = _clean(chart_blocks_text)\n    if _expects_chart(original_query)\
          \ and chart_blocks:\n        answer = _remove_plain_chart_fences(answer)\n\
          \        if '```chart' not in answer:\n            answer = (answer.rstrip()\
          \ + '\\n\\n' + chart_blocks).strip()\n    bound = _normalize_bound_object(_loads(target_object_json,\
          \ {}))\n    if _clean(resolution_status).lower() in ['ambiguous', 'missing',\
          \ 'not_found']:\n        bound = {}\n    payload = {\n        'protocolVersion':\
          \ '1.0',\n        'turnType': _turn_type(task_type, resolution_status),\n\
          \        'answerText': answer,\n        'processEvents': [],\n        'writeback':\
          \ {},\n        'boundObject': bound,\n    }\n    return {'protocol_answer':\
          \ json.dumps(payload, ensure_ascii=False)}\n"
