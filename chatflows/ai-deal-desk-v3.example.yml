    - data:
        code: "\nimport json\n\n\ndef _clean(value):\n    if value is None:\n    \
          \    return ''\n    return str(value).strip()\n\n\ndef _loads(value, fallback):\n\
          \    if isinstance(value, (dict, list)):\n        return value\n    text\
          \ = _clean(value)\n    if not text:\n        return fallback\n    try:\n\
          \        return json.loads(text)\n    except Exception:\n        return\
          \ fallback\n\n\ndef _number(value, default=0):\n    try:\n        return\
          \ int(round(float(str(value).replace(',', '').replace('%', '').strip())))\n\
          \    except Exception:\n        return default\n\n\ndef _valid_chart(chart):\n\
          \    if not isinstance(chart, dict):\n        return None\n    chart_type\
          \ = _clean(chart.get('type') or chart.get('chartType'))\n    if chart_type\
          \ not in ['bar', 'line', 'pie', 'donut', 'funnel']:\n        return None\n\
          \    data = chart.get('data')\n    if not isinstance(data, list) or not\
          \ data:\n        return None\n    safe_data = []\n    for item in data:\n\
          \        if not isinstance(item, dict):\n            continue\n        name\
          \ = _clean(item.get('name'))\n        if not name:\n            continue\n\
          \        safe_data.append({'name': name[:40], 'value': _number(item.get('value'),\
          \ 0)})\n    if not safe_data:\n        return None\n    return {\n     \
          \   'type': chart_type,\n        'title': _clean(chart.get('title'))[:80],\n\
          \        'unit': _clean(chart.get('unit'))[:12],\n        'data': safe_data,\n\
          \    }\n\n\ndef _chart_fence(chart):\n    safe_chart = _valid_chart(chart)\n\
          \    if not safe_chart:\n        return ''\n    return '```chart\\n' + json.dumps(safe_chart,\
          \ ensure_ascii=False, separators=(',', ':')) + '\\n```'\n\n\ndef main(\n\
          \    crm_evidence_json: str = '',\n    knowledge_evidence_json: str = '',\n\
          \    external_evidence_json: str = '',\n    attachment_evidence_json: str\
          \ = '',\n    target_object_json: str = '',\n    answer_goal: str = '',\n\
          \    success_criteria_json: str = '',\n) -> dict:\n    evidences = [\n \
          \       _loads(crm_evidence_json, {}),\n        _loads(knowledge_evidence_json,\
          \ {}),\n        _loads(external_evidence_json, {}),\n        _loads(attachment_evidence_json,\
          \ {}),\n    ]\n    facts, sources, rules, gaps, errors, objects, charts\
          \ = [], [], [], [], [], [], []\n    for evidence in evidences:\n       \
          \ if not isinstance(evidence, dict):\n            continue\n        facts.extend(evidence.get('facts')\
          \ or [])\n        sources.extend(evidence.get('sources') or [])\n      \
          \  rules.extend(evidence.get('rules') or [])\n        gaps.extend(evidence.get('gaps')\
          \ or [])\n        errors.extend(evidence.get('tool_errors') or [])\n   \
          \     objects.extend(evidence.get('objects') or [])\n        charts.extend(evidence.get('charts')\
          \ or [])\n\n    target = _loads(target_object_json, {})\n    if not target\
          \ and objects:\n        target = objects[0]\n    chart_blocks = [_chart_fence(chart)\
          \ for chart in charts[:3]]\n    chart_blocks_text = '\\n\\n'.join(block\
          \ for block in chart_blocks if block)\n\n    ledger = {\n        'answer_goal':\
          \ _clean(answer_goal),\n        'target_object': target if isinstance(target,\
          \ dict) else {},\n        'facts': facts,\n        'sources': sources,\n\
          \        'rules': rules,\n        'gaps': gaps,\n        'tool_errors':\
          \ errors,\n        'charts': charts,\n        'chart_blocks_text': chart_blocks_text,\n\
          \        'success_criteria': _loads(success_criteria_json, []),\n    }\n\
          \    ledger_text = '\\n'.join([\n        f\"回答目标：{_clean(answer_goal) or\
          \ '未明确'}\",\n        f\"目标对象：{json.dumps(ledger['target_object'], ensure_ascii=False)}\"\
          ,\n        \"CRM/公开/附件事实：\\n\" + ('\\n'.join(f\"- {item}\" for item in facts[:10])\
          \ or \"- 无\"),\n        \"规则依据：\\n\" + ('\\n'.join(f\"- {item.get('title')}:\
          \ {item.get('content')}\" for item in rules[:5] if isinstance(item, dict))\
          \ or \"- 无\"),\n        \"来源链接：\\n\" + ('\\n'.join(f\"- {item.get('title')}:\
          \ {item.get('url')}\" for item in sources[:5] if isinstance(item, dict))\
          \ or \"- 无\"),\n        \"缺失信息：\\n\" + ('\\n'.join(f\"- {item}\" for item\
          \ in gaps[:8]) or \"- 无\"),\n        \"工具错误：\\n\" + ('\\n'.join(f\"- {item}\"\
          \ for item in errors[:5]) or \"- 无\"),\n    ])\n    ledger['ledger_text']\
          \ = ledger_text\n    return {\n        'ledger_json': json.dumps(ledger,\
          \ ensure_ascii=False),\n        'ledger_text': ledger_text,\n        'target_object_json':\
          \ json.dumps(ledger['target_object'], ensure_ascii=False),\n        'chart_blocks_text':\
          \ chart_blocks_text,\n    }\n"
        code_language: python3
