  - description: 当前待确认写入草稿 ID
    id: 0fcbcff0-3c62-4f0f-a2cb-7d4f88b54811
    name: active_writeback_id
    selector:
    - conversation
    - active_writeback_id
    value: ''
    value_type: string
  - description: 当前待确认写入草稿状态
    id: 488a2f8d-e971-4db0-a3bd-0450e10c2ae2
    name: active_writeback_status
    selector:
    - conversation
    - active_writeback_status
    value: ''
    value_type: string
  - description: 当前待确认写入草稿类型
    id: f6d7d452-19c5-403b-9f47-3088d5c8db0a
    name: active_writeback_type
    selector:
    - conversation
    - active_writeback_type
    value: ''
    value_type: string
  - description: 当前待确认写入草稿 payload
    id: 54f17a72-c725-4aeb-a63e-c5cc8d529436
    name: active_writeback_payload_json
    selector:
    - conversation
    - active_writeback_payload_json
    value: ''
    value_type: string
  environment_variables:
  - description: 'CordysCRM AI Deal Desk Dify Tool Gateway base URL. Example: http://localhost:8081/anonymous/ai/deal-desk/dify-tools'
    id: b0766b1f-b993-4693-b455-b086070c759e
    name: CRM_TOOL_BASE_URL
    selector:
    - env
    - CRM_TOOL_BASE_URL
    value: https://your-domain.example.com/anonymous/ai/deal-desk/dify-tools
    value_type: string
  - description: CordysCRM AI Deal Desk Dify Tool Gateway token.
    id: 68ebf210-6a89-4bd7-9151-7792404e05ac
    name: DIFY_TOOL_TOKEN
    selector:
    - env
    - DIFY_TOOL_TOKEN
    value: replace-with-your-own-token
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
