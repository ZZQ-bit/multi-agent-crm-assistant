    - data:
        code: "import json\nimport re\n\n\nVALID_TASK_TYPES = {\n    'general_chat',\
          \ 'image_answer', 'object_query', 'progress_summary',\n    'sales_assist',\
          \ 'finance_check', 'delivery_check', 'legal_check',\n    'full_review',\
          \ 'stats_analysis', 'content_draft', 'followup_plan',\n    'external_research',\
          \ 'unknown',\n}\nVALID_ANSWER_MODES = {'list_lookup', 'detail_lookup', 'analysis',\
          \ 'chart', 'draft', 'general'}\nVALID_MULTI_OBJECT_STRATEGIES = {'list',\
          \ 'ask_clarification', 'rank', 'summarize'}\nVALID_ANSWER_SCOPES = {'minimal',\
          \ 'concise', 'standard', 'deep_review'}\nVALID_RESOLUTION_STATUSES = {'not_required',\
          \ 'bound', 'resolved', 'ambiguous', 'not_found', 'missing'}\nVALID_KNOWLEDGE_POLICIES\
          \ = {'none', 'required', 'conditional'}\n\n\ndef _clean(value):\n    if\
          \ value is None:\n        return ''\n    return str(value).strip()\n\n\n\
          def _load_json(text):\n    text = _clean(text)\n    if not text:\n     \
          \   return {}\n    try:\n        return json.loads(text)\n    except Exception:\n\
          \        match = re.search(r'\\{.*\\}', text, flags=re.S)\n        if not\
          \ match:\n            return {}\n        try:\n            return json.loads(match.group(0))\n\
          \        except Exception:\n            return {}\n\n\ndef _bool(value):\n\
          \    if isinstance(value, bool):\n        return value\n    return _clean(value).lower()\
          \ in ['true', '1', 'yes', 'y', '是', '需要']\n\n\ndef _choose_answer_mode(task_type,\
          \ payload):\n    answer_mode = _clean(payload.get('answer_mode')) if isinstance(payload,\
          \ dict) else ''\n    if answer_mode in VALID_ANSWER_MODES:\n        return\
          \ answer_mode\n    defaults = {\n        'general_chat': 'general',\n  \
          \      'image_answer': 'general',\n        'object_query': 'detail_lookup',\n\
          \        'stats_analysis': 'chart',\n        'content_draft': 'draft',\n\
          \        'followup_plan': 'draft',\n    }\n    return defaults.get(task_type,\
          \ 'analysis')\n\n\ndef _choose_multi_object_strategy(answer_mode, task_type,\
          \ payload):\n    strategy = _clean(payload.get('multi_object_strategy'))\
          \ if isinstance(payload, dict) else ''\n    if strategy in VALID_MULTI_OBJECT_STRATEGIES:\n\
          \        return strategy\n    if answer_mode == 'list_lookup':\n       \
          \ return 'list'\n    if answer_mode == 'chart' or task_type in ['stats_analysis',\
          \ 'external_research']:\n        return 'summarize'\n    return 'ask_clarification'\n\
          \n\ndef _choose_answer_scope(answer_mode, task_type, payload):\n    scope\
          \ = _clean(payload.get('answer_scope')) if isinstance(payload, dict) else\
          \ ''\n    if scope in VALID_ANSWER_SCOPES:\n        return scope\n    if\
          \ task_type == 'full_review':\n        return 'deep_review'\n    if answer_mode\
          \ in ['list_lookup', 'detail_lookup', 'general']:\n        return 'concise'\n\
          \    return 'standard'\n\n\ndef main(planner_text: str = '', has_images:\
          \ str = '', bound_object_json: str = '', original_query: str = '') -> dict:\n\
          \    payload = _load_json(planner_text)\n    task_type = _clean(payload.get('task_type'))\
          \ if isinstance(payload, dict) else 'unknown'\n    if task_type not in VALID_TASK_TYPES:\n\
          \        task_type = 'unknown'\n\n    image_present = _bool(has_images)\n\
          \    if task_type == 'image_answer' and not image_present:\n        task_type\
          \ = 'general_chat'\n\n    answer_mode = _choose_answer_mode(task_type, payload)\n\
          \    multi_object_strategy = _choose_multi_object_strategy(answer_mode,\
          \ task_type, payload)\n    answer_scope = _choose_answer_scope(answer_mode,\
          \ task_type, payload)\n\n    business_tasks = VALID_TASK_TYPES - {'general_chat',\
          \ 'image_answer', 'unknown'}\n    if task_type == 'general_chat':\n    \
          \    route_group = 'general_chat'\n    elif task_type == 'image_answer':\n\
          \        route_group = 'image_answer'\n    elif task_type in business_tasks:\n\
          \        route_group = 'business_task'\n    else:\n        route_group =\
          \ 'general_chat'\n\n    required_sources = payload.get('required_sources')\
          \ if isinstance(payload.get('required_sources'), dict) else {}\n    required_agents\
          \ = payload.get('required_agents') if isinstance(payload.get('required_agents'),\
          \ dict) else {}\n    knowledge_policy = _clean(payload.get('knowledge_policy')).lower()\n\
          \    if knowledge_policy not in VALID_KNOWLEDGE_POLICIES:\n        knowledge_policy\
          \ = 'required' if _bool(required_sources.get('knowledge')) else 'none'\n\
          \    knowledge_goal = _clean(payload.get('knowledge_goal'))\n\n    object_reference\
          \ = _clean(payload.get('object_reference'))\n    resolution_status = _clean(payload.get('resolution_status')).lower()\n\
          \    if resolution_status not in VALID_RESOLUTION_STATUSES:\n        resolution_status\
          \ = ''\n    target = payload.get('target_object') if isinstance(payload.get('target_object'),\
          \ dict) else {}\n    bound_target = _load_json(bound_object_json)\n    target_id\
          \ = _clean(target.get('object_id') or target.get('objectId'))\n\n    if\
          \ resolution_status == 'bound':\n        if not target and isinstance(bound_target,\
          \ dict):\n            target = bound_target\n    elif resolution_status\
          \ in ['ambiguous', 'not_found', 'missing']:\n        target = {}\n    elif\
          \ resolution_status == 'resolved' and not target_id:\n        resolution_status\
          \ = 'missing'\n        target = {}\n    elif not resolution_status:\n  \
          \      if target_id:\n            resolution_status = 'resolved'\n     \
          \   elif not object_reference and isinstance(bound_target, dict) and bound_target:\n\
          \            target = bound_target\n            resolution_status = 'bound'\n\
          \        elif object_reference:\n            resolution_status = 'missing'\n\
          \            target = {}\n        else:\n            resolution_status =\
          \ 'not_required'\n\n    if resolution_status in ['ambiguous', 'not_found',\
          \ 'missing']:\n        task_type = 'object_query'\n        route_group =\
          \ 'business_task'\n        answer_mode = 'detail_lookup'\n        multi_object_strategy\
          \ = 'ask_clarification'\n        answer_scope = 'concise'\n        required_sources\
          \ = {'crm': True, 'knowledge': False, 'external': False, 'attachment': False}\n\
          \        required_agents = {'sales': False, 'finance': False, 'delivery':\
          \ False, 'legal': False, 'analytics': False}\n        knowledge_policy =\
          \ 'none'\n        knowledge_goal = ''\n\n    if task_type == 'object_query'\
          \ and answer_mode in ['list_lookup', 'detail_lookup']:\n        required_sources['crm']\
          \ = True\n        required_agents = {'sales': False, 'finance': False, 'delivery':\
          \ False, 'legal': False, 'analytics': False}\n        knowledge_policy =\
          \ 'none'\n        knowledge_goal = ''\n\n    if task_type == 'full_review':\n\
          \        required_agents.update({'sales': True, 'finance': True, 'delivery':\
          \ True, 'legal': True})\n\n    if task_type == 'object_query' and answer_mode\
          \ in ['list_lookup', 'detail_lookup']:\n        agent_route = 'crm_light_answer'\n\
          \    elif _bool(required_agents.get('sales')) and _bool(required_agents.get('finance'))\
          \ and _bool(required_agents.get('delivery')) and _bool(required_agents.get('legal')):\n\
          \        agent_route = 'full_review'\n    elif _bool(required_agents.get('finance')):\n\
          \        agent_route = 'finance'\n    elif _bool(required_agents.get('delivery')):\n\
          \        agent_route = 'delivery'\n    elif _bool(required_agents.get('legal')):\n\
          \        agent_route = 'legal'\n    elif _bool(required_agents.get('analytics')):\n\
          \        agent_route = 'analytics'\n    elif _bool(required_agents.get('sales')):\n\
          \        agent_route = 'sales'\n    else:\n        agent_route = 'none'\n\
          \n    direct_answer = _clean(payload.get('direct_answer')) if route_group\
          \ == 'general_chat' else ''\n    knowledge_eligible = route_group == 'business_task'\
          \ and knowledge_policy != 'none'\n\n    return {\n        'task_type': task_type,\n\
          \        'route_group': route_group,\n        'object_reference': object_reference,\n\
          \        'resolution_status': resolution_status,\n        'target_object_json':\
          \ json.dumps(target if isinstance(target, dict) else {}, ensure_ascii=False),\n\
          \        'need_crm': 'true' if _bool(required_sources.get('crm')) else 'false',\n\
          \        'need_knowledge': 'true' if knowledge_eligible else 'false',\n\
          \        'knowledge_policy': knowledge_policy,\n        'knowledge_goal':\
          \ knowledge_goal,\n        'need_external': 'true' if _bool(required_sources.get('external'))\
          \ else 'false',\n        'need_attachment': 'true' if image_present or _bool(required_sources.get('attachment'))\
          \ else 'false',\n        'agent_route': agent_route,\n        'answer_mode':\
          \ answer_mode,\n        'multi_object_strategy': multi_object_strategy,\n\
          \        'answer_scope': answer_scope,\n        'answer_goal': _clean(payload.get('answer_goal')),\n\
          \        'direct_answer': direct_answer,\n        'success_criteria_json':\
          \ json.dumps(payload.get('success_criteria') or [], ensure_ascii=False),\n\
          \        'planner_reason': _clean(payload.get('reason')),\n        'planner_confidence':\
          \ str(payload.get('confidence') or ''),\n    }"
        code_language: python3
