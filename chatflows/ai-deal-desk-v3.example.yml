    - data:
        code: "import json\nimport re\n\n\nMAX_CHARS = 260\nVALID_POLICIES = {'none',\
          \ 'required', 'conditional'}\nVALID_DOMAINS = {'sales', 'finance', 'delivery',\
          \ 'legal', 'general'}\n\n\ndef _clean(value):\n    if value is None:\n \
          \       return ''\n    return re.sub(r'\\s+', ' ', str(value)).strip()\n\
          \n\ndef _load_json(text):\n    text = _clean(text)\n    if not text:\n \
          \       return {}\n    try:\n        return json.loads(text)\n    except\
          \ Exception:\n        match = re.search(r'\\{.*\\}', text, flags=re.S)\n\
          \        if not match:\n            return {}\n        try:\n          \
          \  return json.loads(match.group(0))\n        except Exception:\n      \
          \      return {}\n\n\ndef _bool(value):\n    if isinstance(value, bool):\n\
          \        return value\n    return _clean(value).lower() in ['true', '1',\
          \ 'yes', 'y', '是', '需要']\n\n\ndef _string_list(value, allowed=None, limit=8):\n\
          \    if not isinstance(value, list):\n        return []\n    result = []\n\
          \    for item in value:\n        text = _clean(item)\n        if not text\
          \ or (allowed and text not in allowed) or text in result:\n            continue\n\
          \        result.append(text)\n        if len(result) >= limit:\n       \
          \     break\n    return result\n\n\ndef main(\n    decision_text: str =\
          \ '',\n    knowledge_policy: str = '',\n    original_query: str = '',\n\
          \    knowledge_goal: str = '',\n    answer_goal: str = '',\n) -> dict:\n\
          \    payload = _load_json(decision_text)\n    policy = _clean(knowledge_policy).lower()\n\
          \    if policy not in VALID_POLICIES:\n        policy = 'none'\n\n    if\
          \ policy == 'required':\n        need_knowledge = True\n    elif policy\
          \ == 'conditional':\n        need_knowledge = _bool(payload.get('need_knowledge'))\
          \ if payload else bool(_clean(knowledge_goal))\n    else:\n        need_knowledge\
          \ = False\n\n    focus_domains = _string_list(payload.get('focus_domains'),\
          \ VALID_DOMAINS, 5)\n    facts_used = _string_list(payload.get('facts_used'),\
          \ None, 6)\n    reason = _clean(payload.get('reason'))[:160]\n    query\
          \ = _clean(payload.get('knowledge_query'))\n    if need_knowledge and not\
          \ query:\n        query = _clean(' '.join(filter(None, [original_query,\
          \ knowledge_goal, answer_goal, ' '.join(facts_used)])))\n        if not\
          \ payload:\n            reason = reason or '知识检索决策输出不可解析，已按 Planner 策略生成降级查询'\n\
          \    if not need_knowledge:\n        query = ''\n\n    if need_knowledge\
          \ and not query:\n        need_knowledge = False\n        reason = reason\
          \ or '没有形成可执行的知识检索问题'\n\n    return {\n        'need_knowledge': 'true'\
          \ if need_knowledge else 'false',\n        'text': query[:MAX_CHARS],\n\
          \        'focus_domains_json': json.dumps(focus_domains, ensure_ascii=False),\n\
          \        'facts_used_json': json.dumps(facts_used, ensure_ascii=False),\n\
          \        'reason': reason,\n    }"
        code_language: python3
        desc: 校验模型 JSON、落实 required/conditional/none 策略并限制单条查询不超过 260 字符；不使用固定业务词表。
