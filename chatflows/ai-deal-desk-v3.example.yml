    - data:
        code: "def _clean(value):\n    if value is None:\n        return ''\n    if\
          \ isinstance(value, list):\n        return '\\n\\n'.join(_clean(item) for\
          \ item in value if _clean(item))\n    if isinstance(value, dict):\n    \
          \    return '\\n'.join(f'{k}: {_clean(v)}' for k, v in value.items() if\
          \ _clean(v))\n    return str(value).strip()\n\n\ndef _clip(text, limit=4000):\n\
          \    text = _clean(text)\n    if len(text) <= limit:\n        return text\n\
          \    return text[:limit].rstrip() + '\\n...[图片识别内容较长，已截断用于保持上下文可控]'\n\n\n\
          def main(\n    manual_summary: str = '',\n    manual_names: str = '',\n\
          \    image_summary: str = '',\n) -> dict:\n    names = _clean(manual_names)\n\
          \    parts = []\n    if _clean(manual_summary):\n        parts.append('用户/前端提供的附件摘要：\\\
          n' + _clip(manual_summary, 1500))\n    if _clean(image_summary):\n     \
          \   title = '图片/截图识别摘要'\n        if names:\n            title += f'（{names}）'\n\
          \        parts.append(title + '：\\n' + _clip(image_summary, 3000))\n   \
          \ summary = '\\n\\n---\\n\\n'.join(parts)\n    if not summary and names:\n\
          \        summary = '本轮检测到图片附件，但没有识别到可用于分析的业务文本。'\n    return {\n       \
          \ 'attachments_summary': summary,\n        'attachment_names': names,\n\
          \        'image_summary': _clean(image_summary),\n    }\n"
