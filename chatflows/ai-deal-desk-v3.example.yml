          \    if isinstance(value, (dict, list)):\n        return value\n    text\
          \ = _clean(value)\n    if not text:\n        return fallback\n    try:\n\
          \        return json.loads(text)\n    except Exception:\n        return\
          \ fallback\n\n\ndef _number(value, default=0):\n    text = _clean(value).replace(',',\
          \ '').replace('%', '')\n    if not text:\n        return default\n    try:\n\
          \        return int(round(float(text)))\n    except Exception:\n       \
          \ return default\n\n\ndef _single_deal_progress_chart(data):\n    if not\
          \ isinstance(data, dict):\n        return None\n    opportunity = data.get('opportunity')\
          \ if isinstance(data.get('opportunity'), dict) else {}\n    facts = data.get('businessFacts')\
          \ if isinstance(data.get('businessFacts'), dict) else {}\n    if not opportunity:\n\
          \        return None\n\n    opportunity_name = (\n        _clean(opportunity.get('name'))\n\
          \        or _clean(facts.get('opportunityName'))\n        or '当前商机'\n  \
          \  )\n    stage = _clean(opportunity.get('stage'))\n    stage_name = _clean(opportunity.get('stageName'))\
          \ or _clean(facts.get('stageName'))\n    win_rate = _number(opportunity.get('possible')\
          \ or facts.get('winRate'), 0)\n\n    stage_index = -1\n    stage_key = (stage\
          \ + ' ' + stage_name).lower()\n    if 'success' in stage_key or '赢单' in\
          \ stage_key or '成交' in stage_key or '签约' in stage_key:\n        stage_index\
          \ = 4\n    elif 'contract' in stage_key or '合同' in stage_key:\n        stage_index\
          \ = 3\n    elif 'business_procurement' in stage_key or '商务' in stage_key\
          \ or '采购' in stage_key:\n        stage_index = 2\n    elif 'solution' in\
          \ stage_key or '方案' in stage_key or '评审' in stage_key or '验证' in stage_key:\n\
          \        stage_index = 1\n    elif 'clear_requirements' in stage_key or\
          \ '需求' in stage_key:\n        stage_index = 0\n    elif 'create' in stage_key\
          \ or '新建' in stage_key:\n        stage_index = -1\n\n    stage_names = ['需求确认',\
          \ '方案评审', '商务沟通', '合同推进']\n    values = []\n    for index, name in enumerate(stage_names):\n\
          \        if stage_index >= index:\n            value = 100\n        elif\
          \ index == max(stage_index + 1, 0):\n            value = win_rate\n    \
          \    else:\n            value = 0\n        values.append({'name': name,\
          \ 'value': value})\n    values.append({'name': '赢单预测', 'value': win_rate})\n\
          \n    return {\n        'type': 'funnel',\n        'title': f'{opportunity_name}\
          \ - 销售推进漏斗',\n        'unit': '%',\n        'data': values,\n    }\n\n\n\
          def main(response_body: str = '', crm_action: str = '') -> dict:\n    envelope\
          \ = _loads(response_body, {})\n    facts = []\n    objects = []\n    gaps\
          \ = []\n    tool_errors = []\n    charts = []\n\n    code = _clean(envelope.get('code'))\n\
          \    message = _clean(envelope.get('message'))\n    data = envelope.get('data')\
          \ if isinstance(envelope.get('data'), dict) else {}\n    candidates = data.get('candidates')\
          \ if isinstance(data.get('candidates'), list) else []\n    result_type =\
          \ _clean(data.get('resultType')) or ('candidate_list' if candidates else\
          \ '')\n    count = data.get('count') if data.get('count') is not None else\
          \ len(candidates)\n\n    if code == 'SKIPPED' or not envelope:\n       \
          \ tool_status = 'skipped'\n        gaps.append('本轮未调用 CRM 读取工具。')\n    elif\
          \ code == 'OK' or (code == 'OBJECT_AMBIGUOUS' and candidates):\n       \
          \ tool_status = 'ok'\n    else:\n        tool_status = 'error'\n       \
          \ tool_errors.append(message or f'CRM 工具返回 {code}')\n\n    if data and (tool_status\
          \ == 'ok' or candidates):\n        fact_data = {}\n        for key in [\n\
          \            'opportunity', 'customer', 'opportunities', 'contacts',\n \
          \           'recentFollowRecords', 'openFollowPlans', 'businessFacts',\n\
          \            'dealTerms', 'riskSignals', 'missingFields', 'sourceRefs',\n\
          \            'funnelSnapshot', 'stats', 'summary',\n        ]:\n       \
          \     value = data.get(key)\n            if isinstance(value, list):\n \
          \               fact_data[key] = value[:10]\n            elif value is not\
          \ None:\n                fact_data[key] = value\n        facts.append(json.dumps(fact_data\
          \ or data, ensure_ascii=False))\n        if isinstance(data.get('chart'),\
          \ dict):\n            charts.append(data.get('chart'))\n        progress_chart\
          \ = _single_deal_progress_chart(data)\n        if progress_chart:\n    \
          \        charts.append(progress_chart)\n        if isinstance(data.get('customer'),\
          \ dict):\n            cust = data.get('customer') or {}\n            objects.append({'objectType':\
          \ 'customer', 'objectId': _clean(cust.get('id')), 'objectName': _clean(cust.get('name'))})\n\
          \        if isinstance(data.get('opportunity'), dict):\n            opp\
          \ = data.get('opportunity') or {}\n            objects.append({'objectType':\
          \ 'opportunity', 'objectId': _clean(opp.get('id')), 'objectName': _clean(opp.get('name'))})\n\
          \        if isinstance(data.get('resolvedObject'), dict):\n            resolved\
          \ = data.get('resolvedObject') or {}\n            objects.append({\n   \
          \             'objectType': _clean(resolved.get('objectType') or resolved.get('type')),\n\
          \                'objectId': _clean(resolved.get('objectId') or resolved.get('id')),\n\
          \                'objectName': _clean(resolved.get('objectName') or resolved.get('name')),\n\
          \                'customerId': _clean(resolved.get('customerId')),\n   \
          \             'customerName': _clean(resolved.get('customerName')),\n  \
          \              'source': _clean(resolved.get('source')) or 'crm_resolver',\n\
          \            })\n        for item in candidates[:10]:\n            if isinstance(item,\
          \ dict):\n                object_type = _clean(item.get('objectType'))\n\
          \                if not object_type:\n                    object_type =\
          \ 'opportunity' if _clean(crm_action) == 'search_opportunities' else 'customer'\n\
          \                objects.append({\n                    'objectType': object_type,\n\
