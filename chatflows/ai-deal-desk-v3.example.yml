app:
  description: 'AI Deal Desk Phase 4 stable Chatflow for CRM deal review and writeback.


    【模型 / 工具选型矩阵 · 2026-07-03 维护】

    文本 LLM 节点（全部 siliconflow Pro/zai-org/GLM-5.1, enable_thinking: false）：

    - 主 Agent 参数抽取：extract_params（GLM-5.1，温度 0.2，top_p 1）

    - 检索改写：query_rewrite_v2（GLM-5.1，max_tokens 200，温度 0.2）

    - 规则重排：rerank_rules_v2（GLM-5.1，max_tokens 1200，温度 0.2）

    - 5 个专家/协调 Agent：sales_agent / finance_agent / delivery_agent / legal_agent / coordinator_agent（GLM-5.1）

    - 面向用户的 Agent：preflight_quick_answer / image_direct_answer / finance_task_agent / delivery_task_agent / legal_task_agent / sales_task_agent（GLM-5.1；sales_task_agent max_tokens 1500，温度 0.3）


    工具型 Agent 节点：

    - 外部情报检索 Agent：FunctionCalling，模型使用 GLM-5.1，工具为 current_time / Tavily Search / Tavily Extract；只在外部情报门控命中后运行，由 Agent 自主决定是否搜索、是否抓取网页正文。


    视觉 LLM 节点：

    - attachment_image_summary：tongyi qwen3.6-plus，温度 0.2，detail=high


    知识库：

    - deal_rules_knowledge：single_retrieval_config 配 openai gpt-4o（如需切换国产模型请走 P1 评估），Top K / 重排以导入后 Dify 节点为准


    工具依赖：

    - tavily：由外部情报检索 Agent 按需调用 tavily_search / tavily_extract

    - time：由外部情报检索 Agent 按需调用 current_time


    协议契约：所有 answer 节点输出仍走现有 protocol JSON（protocolVersion / turnType / answerText / processEvents / boundObject / writeback / warnings），外部接口不变。'
