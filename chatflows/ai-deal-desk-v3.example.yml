app:
  description: crm 多智能助手
  icon: briefcase
  icon_background: '#E0F2FE'
  icon_type: emoji
  mode: advanced-chat
  name: AI Deal Desk - V3 Stable Enhanced
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/openai_api_compatible:0.0.55@d64be9924f2edf13fd5329fc03fdfc0d0e0e36e0aef5321c4942f0845de8c030
    version: null
- current_identifier: null
