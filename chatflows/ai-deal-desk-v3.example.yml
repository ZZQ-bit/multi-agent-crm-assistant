          \ ''\n    return str(value).strip()\n\n\ndef _loads(value, fallback):\n\
          \    if isinstance(value, (dict, list)):\n        return value\n    text\
          \ = _clean(value)\n    if not text:\n        return fallback\n    try:\n\
          \        return json.loads(text)\n    except Exception:\n        return\
          \ fallback\n\n\ndef _first_data(evidence):\n    facts = evidence.get('facts')\
          \ if isinstance(evidence.get('facts'), list) else []\n    for item in facts:\n\
          \        parsed = _loads(item, {})\n        if isinstance(parsed, dict)\
          \ and parsed:\n            return parsed\n    return {}\n\n\ndef _fmt(value,\
          \ empty='-'):\n    text = _clean(value)\n    return text if text else empty\n\
          \n\ndef _money(value):\n    text = _clean(value)\n    if not text:\n   \
          \     return '-'\n    try:\n        number = float(text.replace(',', ''))\n\
          \        if number.is_integer():\n            return f'{int(number):,}'\n\
          \        return f'{number:,.2f}'\n    except Exception:\n        return\
          \ text\n\n\ndef _percent(value):\n    text = _clean(value)\n    if not text:\n\
          \        return '-'\n    return text if text.endswith('%') else f'{text}%'\n\
          \n\ndef _date(value):\n    text = _clean(value)\n    if not text:\n    \
          \    return '-'\n    try:\n        number = int(float(text))\n        if\
          \ number > 100000000000:\n            dt = datetime.fromtimestamp(number\
          \ / 1000, tz=timezone(timedelta(hours=8)))\n            return dt.strftime('%Y-%m-%d')\n\
          \    except Exception:\n        pass\n    return text\n\n\ndef _md_table(headers,\
          \ rows):\n    lines = [\n        '| ' + ' | '.join(headers) + ' |',\n  \
          \      '| ' + ' | '.join(['---'] * len(headers)) + ' |',\n    ]\n    for\
          \ row in rows:\n        safe = [_clean(cell).replace('\\n', ' ') or '-'\
          \ for cell in row]\n        lines.append('| ' + ' | '.join(safe) + ' |')\n\
          \    return '\\n'.join(lines)\n\n\ndef _candidate_kind(action, candidates):\n\
          \    if _clean(action) == 'resolve_crm_object':\n        return 'mixed'\n\
          \    if _clean(action) == 'search_opportunities':\n        return 'opportunity'\n\
          \    if _clean(action) == 'search_customers':\n        return 'customer'\n\
          \    for item in candidates:\n        if isinstance(item, dict) and any(_clean(item.get(key))\
          \ for key in ['customerName', 'stageName', 'amount', 'possible']):\n   \
          \         return 'opportunity'\n    return 'customer'\n\n\ndef _candidate_answer(evidence,\
          \ original_query):\n    candidates = evidence.get('candidates') if isinstance(evidence.get('candidates'),\
          \ list) else []\n    kind = _candidate_kind(evidence.get('action'), candidates)\n\
          \    count = evidence.get('count') or len(candidates)\n    if kind == 'mixed':\n\
          \        rows = []\n        for item in candidates[:10]:\n            if\
          \ not isinstance(item, dict):\n                continue\n            object_type\
          \ = _clean(item.get('objectType')) or 'unknown'\n            rows.append([\n\
          \                '客户' if object_type == 'customer' else ('商机' if object_type\
          \ == 'opportunity' else '其他'),\n                _fmt(item.get('objectName')\
          \ or item.get('name')),\n                _fmt(item.get('customerName')),\n\
          \                _fmt(item.get('stageName') or item.get('stage')),\n   \
          \             _money(item.get('amount')),\n                _fmt(item.get('ownerName')\
          \ or item.get('owner')),\n            ])\n        return '我识别到多个可能的 CRM\
          \ 对象，请输入完整客户名或商机名继续：\\n\\n' + _md_table(['类型', '名称', '所属客户', '阶段', '金额',\
          \ '负责人'], rows)\n\n    if kind == 'opportunity':\n        rows = []\n  \
          \      for item in candidates[:10]:\n            if not isinstance(item,\
          \ dict):\n                continue\n            rows.append([\n        \
          \        _fmt(item.get('objectName') or item.get('name')),\n           \
          \     _fmt(item.get('customerName')),\n                _fmt(item.get('stageName')\
          \ or item.get('stage')),\n                _money(item.get('amount')),\n\
          \                _percent(item.get('possible')),\n                _fmt(item.get('ownerName')\
          \ or item.get('owner')),\n                _date(item.get('expectedEndTime')\
          \ or item.get('expected_end_time')),\n            ])\n        title = f'查到\
          \ {count} 条匹配商机：'\n        return title + '\\n\\n' + _md_table(['商机名称',\
          \ '客户', '阶段', '金额', '赢率', '负责人', '预计成交'], rows)\n\n    rows = []\n    for\
          \ item in candidates[:10]:\n        if not isinstance(item, dict):\n   \
          \         continue\n        rows.append([\n            _fmt(item.get('objectName')\
          \ or item.get('name')),\n            _fmt(item.get('ownerName') or item.get('owner')),\n\
          \            _fmt(item.get('levelName') or item.get('level')),\n       \
          \     _fmt(item.get('industryName') or item.get('industry')),\n        \
          \    _date(item.get('followTime') or item.get('follow_time')),\n       \
          \ ])\n    title = f'查到 {count} 条匹配客户：'\n    return title + '\\n\\n' + _md_table(['客户名称',\
          \ '负责人', '级别', '行业', '最近跟进'], rows)\n\n\ndef _detail_answer(evidence):\n\
          \    data = _first_data(evidence)\n    opp = data.get('opportunity') if\
          \ isinstance(data.get('opportunity'), dict) else {}\n    customer = data.get('customer')\
          \ if isinstance(data.get('customer'), dict) else {}\n    facts = data.get('businessFacts')\
          \ if isinstance(data.get('businessFacts'), dict) else {}\n    if opp:\n\
          \        rows = [\n            ['商机名称', _fmt(opp.get('name') or facts.get('opportunityName'))],\n\
          \            ['客户', _fmt(opp.get('customerName') or customer.get('name')\
          \ or facts.get('customerName'))],\n            ['阶段', _fmt(opp.get('stageName')\
          \ or facts.get('stageName'))],\n            ['金额', _money(opp.get('amount')\
          \ or facts.get('amount'))],\n            ['赢率', _percent(opp.get('possible')\
          \ or facts.get('winRate'))],\n            ['负责人', _fmt(opp.get('ownerName')\
          \ or facts.get('ownerName'))],\n            ['最新跟进', _fmt(facts.get('latestFollowRecord'))],\n\
          \            ['下一步计划', _fmt(facts.get('nextFollowPlan') or facts.get('nextOpenPlan'))],\n\
          \        ]\n        return '这是当前 CRM 里查到的商机摘要：\\n\\n' + _md_table(['项目',\
          \ '信息'], rows)\n    if customer:\n        rows = [\n            ['客户名称',\
          \ _fmt(customer.get('name'))],\n            ['负责人', _fmt(customer.get('ownerName')\
          \ or customer.get('owner'))],\n            ['客户级别', _fmt(customer.get('levelName')\
          \ or customer.get('level'))],\n            ['行业', _fmt(customer.get('industryName')\
