    - data:
        code: "import json\n\n\ndef _clean(value):\n    if value is None:\n      \
          \  return ''\n    return str(value).strip()\n\n\ndef _score(item, metadata):\n\
          \    value = item.get('score')\n    if value is None and isinstance(metadata,\
          \ dict):\n        value = metadata.get('score')\n    try:\n        return\
          \ round(float(value), 6)\n    except Exception:\n        return None\n\n\
          \ndef main(\n    knowledge_result=None,\n    decision_skipped: str = '',\n\
          \    policy_skipped: str = '',\n    query_text: str = '',\n) -> dict:\n\
          \    rules = []\n    gaps = []\n    retrieval_status = 'completed'\n   \
          \ skip_reason = ''\n\n    if _clean(policy_skipped):\n        retrieval_status\
          \ = 'not_required'\n        skip_reason = 'planner_policy_none'\n    elif\
          \ _clean(decision_skipped):\n        retrieval_status = 'not_required'\n\
          \        skip_reason = 'evidence_decision_not_needed'\n\n    items = knowledge_result\
          \ if isinstance(knowledge_result, list) else []\n    seen = set()\n    for\
          \ item in items:\n        if not isinstance(item, dict):\n            continue\n\
          \        metadata = item.get('metadata') if isinstance(item.get('metadata'),\
          \ dict) else {}\n        title = _clean(item.get('title') or metadata.get('document_name')\
          \ or metadata.get('name'))\n        content = _clean(item.get('content')\
          \ or item.get('text'))\n        source = _clean(\n            item.get('url')\n\
          \            or metadata.get('source_url')\n            or metadata.get('document_name')\n\
          \            or metadata.get('data_source_type')\n        )\n        key\
          \ = (title.lower(), ' '.join(content.lower().split())[:240])\n        if\
          \ not (title or content) or key in seen:\n            continue\n       \
          \ seen.add(key)\n        rules.append({\n            'title': title,\n \
          \           'content': content[:800],\n            'relevance': _score(item,\
          \ metadata),\n            'source': source,\n            'url': _clean(item.get('url')),\n\
          \        })\n        if len(rules) >= 8:\n            break\n\n    if retrieval_status\
          \ == 'completed' and not rules:\n        gaps.append('知识库已执行检索，但未召回直接相关规则。')\n\
          \n    evidence = {\n        'source': 'knowledge',\n        'retrieval_status':\
          \ retrieval_status,\n        'query': _clean(query_text),\n        'skip_reason':\
          \ skip_reason,\n        'rules': rules,\n        'gaps': gaps,\n       \
          \ 'tool_errors': [],\n    }\n    return {\n        'evidence_json': json.dumps(evidence,\
          \ ensure_ascii=False),\n        'evidence_text': json.dumps(evidence, ensure_ascii=False),\n\
          \    }"
        code_language: python3
