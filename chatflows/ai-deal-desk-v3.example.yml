    - data:
        code: "\nimport json\nimport re\nfrom datetime import datetime, timezone, timedelta\n\n\ndef _clean(value):\n    if value is None:\n        return ''\n    return str(value).strip()\n\n\ndef _loads(value, fallback):\n    if isinstance(value, (dict, list)):\n        return value\n    text = _clean(value)\n    if not text:\n        return fallback\n    try:\n        return json.loads(text)\n    except Exception:\n        return fallback\n\n\ndef _first_data(evidence):\n    facts = evidence.get('facts') if isinstance(evidence.get('facts'), list) else []\n    for item in facts:\n        parsed = _loads(item, {})\n        if isinstance(parsed, dict) and parsed:\n            return parsed\n    return {}\n\n\ndef _fmt(value, empty='-'):\n    text = _clean(value)\n    return text if text else empty\n\n\ndef _money(value):\n    text = _clean(value)\n    if not text:\n        return '-'\n    try:\n        number = float(text.replace(',', ''))\n        if number.is_integer():\n            return\
          \ f'{int(number):,}'\n        return f'{number:,.2f}'\n    except Exception:\n        return text\n\n\ndef _percent(value):\n    text = _clean(value)\n    if not text:\n        return '-'\n    return text if text.endswith('%') else f'{text}%'\n\n\ndef _date(value):\n    text = _clean(value)\n    if not text:\n        return '-'\n    try:\n        number = int(float(text))\n        if number > 100000000000:\n            dt = datetime.fromtimestamp(number / 1000, tz=timezone(timedelta(hours=8)))\n            return dt.strftime('%Y-%m-%d')\n    except Exception:\n        pass\n    return text\n\n\ndef _md_table(headers, rows):\n    lines = [\n        '| ' + ' | '.join(headers) + ' |',\n        '| ' + ' | '.join(['---'] * len(headers)) + ' |',\n    ]\n    for row in rows:\n        safe = [_clean(cell).replace('\\n', ' ') or '-' for cell in row]\n        lines.append('| ' + ' | '.join(safe) + ' |')\n    return '\\n'.join(lines)\n\n\ndef _candidate_kind(action, candidates):\n    if _clean(action)\
          \ == 'search_opportunities':\n        return 'opportunity'\n    if _clean(action) == 'search_customers':\n        return 'customer'\n    for item in candidates:\n        if isinstance(item, dict) and any(_clean(item.get(key)) for key in ['customerName', 'stageName', 'amount', 'possible']):\n            return 'opportunity'\n    return 'customer'\n\n\ndef _candidate_answer(evidence, original_query):\n    candidates = evidence.get('candidates') if isinstance(evidence.get('candidates'), list) else []\n    kind = _candidate_kind(evidence.get('action'), candidates)\n    count = evidence.get('count') or len(candidates)\n    if kind == 'opportunity':\n        rows = []\n        for item in candidates[:10]:\n            if not isinstance(item, dict):\n                continue\n            rows.append([\n                _fmt(item.get('name')),\n                _fmt(item.get('customerName')),\n                _fmt(item.get('stageName') or item.get('stage')),\n                _money(item.get('amount')),\n\
          \                _percent(item.get('possible')),\n                _fmt(item.get('ownerName') or item.get('owner')),\n                _date(item.get('expectedEndTime') or item.get('expected_end_time')),\n            ])\n        title = f'查到 {count} 条匹配商机，先按 CRM 返回结果列出：'\n        return title + '\\n\\n' + _md_table(['商机名称', '客户', '阶段', '金额', '赢率', '负责人', '预计成交'], rows)\n\n    rows = []\n    for item in candidates[:10]:\n        if not isinstance(item, dict):\n            continue\n        rows.append([\n            _fmt(item.get('name')),\n            _fmt(item.get('ownerName') or item.get('owner')),\n            _fmt(item.get('levelName') or item.get('level')),\n            _fmt(item.get('industryName') or item.get('industry')),\n            _date(item.get('followTime') or item.get('follow_time')),\n        ])\n    title = f'查到 {count} 条匹配客户，先按 CRM 返回结果列出：'\n    return title + '\\n\\n' + _md_table(['客户名称', '负责人', '级别', '行业', '最近跟进'], rows)\n\n\ndef _detail_answer(evidence):\n  \
          \  data = _first_data(evidence)\n    opp = data.get('opportunity') if isinstance(data.get('opportunity'), dict) else {}\n    customer = data.get('customer') if isinstance(data.get('customer'), dict) else {}\n    facts = data.get('businessFacts') if isinstance(data.get('businessFacts'), dict) else {}\n    if opp:\n        rows = [\n            ['商机名称', _fmt(opp.get('name') or facts.get('opportunityName'))],\n            ['客户', _fmt(opp.get('customerName') or customer.get('name') or facts.get('customerName'))],\n            ['阶段', _fmt(opp.get('stageName') or facts.get('stageName'))],\n            ['金额', _money(opp.get('amount') or facts.get('amount'))],\n            ['赢率', _percent(opp.get('possible') or facts.get('winRate'))],\n            ['负责人', _fmt(opp.get('ownerName') or facts.get('ownerName'))],\n            ['最新跟进', _fmt(facts.get('latestFollowRecord'))],\n            ['下一步计划', _fmt(facts.get('nextFollowPlan'))],\n        ]\n        return '这是当前 CRM 里查到的商机摘要：\\n\\n' + _md_table(['项目',\
          \ '信息'], rows)\n    if customer:\n        rows = [\n            ['客户名称', _fmt(customer.get('name'))],\n            ['负责人', _fmt(customer.get('ownerName') or customer.get('owner'))],\n            ['客户级别', _fmt(customer.get('levelName') or customer.get('level'))],\n            ['行业', _fmt(customer.get('industryName') or customer.get('industry'))],\n        ]\n        opportunities = data.get('opportunities') if isinstance(data.get('opportunities'), list) else []\n        answer = '这是当前 CRM 里查到的客户摘要：\\n\\n' + _md_table(['项目', '信息'], rows)\n        if opportunities:\n            answer += '\\n\\n关联商机：\\n\\n' + _md_table(\n                ['商机名称', '阶段', '金额', '赢率'],\n                [[_fmt(item.get('name')), _fmt(item.get('stageName') or item.get('stage')), _money(item.get('amount')), _percent(item.get('possible'))] for item in opportunities[:10] if isinstance(item, dict)]\n            )\n        return answer\n    return ''\n\n\ndef main(crm_evidence_json: str = '', original_query:\
          \ str = '', answer_mode: str = '', multi_object_strategy: str = '') -> dict:\n    evidence = _loads(crm_evidence_json, {})\n    tool_errors = evidence.get('tool_errors') if isinstance(evidence.get('tool_errors'), list) else []\n    gaps = evidence.get('gaps') if isinstance(evidence.get('gaps'), list) else []\n    candidates = evidence.get('candidates') if isinstance(evidence.get('candidates'), list) else []\n\n    if candidates:\n        return {'answer_text': _candidate_answer(evidence, original_query)}\n\n    detail = _detail_answer(evidence)\n    if detail:\n        return {'answer_text': detail}\n\n    if tool_errors:\n        return {'answer_text': 'CRM 查询没有拿到可用结果：' + '；'.join(_clean(item) for item in tool_errors if _clean(item))}\n    if gaps:\n        return {'answer_text': 'CRM 查询暂时没有足够信息：' + '；'.join(_clean(item) for item in gaps if _clean(item))}\n    return {'answer_text': 'CRM 查询完成，但没有返回可展示的客户或商机数据。'}\n"
