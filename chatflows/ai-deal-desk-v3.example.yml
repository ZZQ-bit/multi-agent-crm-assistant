        code: "import json\n\n\nVALID_KNOWLEDGE_POLICIES = {'none', 'required', 'conditional'}\n\
          \n\ndef _clean(value):\n    if value is None:\n        return ''\n    return\
          \ str(value).strip()\n\n\ndef _loads(value, fallback):\n    if isinstance(value,\
          \ (dict, list)):\n        return value\n    text = _clean(value)\n    if\
          \ not text:\n        return fallback\n    try:\n        return json.loads(text)\n\
          \    except Exception:\n        return fallback\n\n\ndef _bool(value):\n\
          \    return _clean(value).lower() in ['true', '1', 'yes', 'y', '是', '需要']\n\
          \n\ndef _relation_target(target):\n    return _clean(\n        target.get('relation_target')\n\
          \        or target.get('relationTarget')\n        or target.get('target_relation')\n\
          \        or target.get('targetRelation')\n    ).lower()\n\n\ndef _is_opportunity_relation(relation):\n\
          \    return relation in ['opportunity', 'opportunities', '商机', '商机列表', '关联商机']\n\
          \n\ndef _is_customer_relation(relation):\n    return relation in ['customer',\
          \ 'customers', '客户', '客户列表', '关联客户']\n\n\ndef main(\n    task_type: str\
          \ = '',\n    original_query: str = '',\n    target_object_json: str = '',\n\
          \    object_reference: str = '',\n    resolution_status: str = '',\n   \
          \ need_crm: str = '',\n    need_knowledge: str = '',\n    knowledge_policy:\
          \ str = '',\n    knowledge_goal: str = '',\n    need_external: str = '',\n\
          \    need_attachment: str = '',\n) -> dict:\n    target = _loads(target_object_json,\
          \ {})\n    object_type = _clean(target.get('object_type') or target.get('objectType'))\n\
          \    object_id = _clean(target.get('object_id') or target.get('objectId'))\n\
          \    object_name = _clean(target.get('object_name') or target.get('objectName'))\n\
          \    relation = _relation_target(target)\n    query = _clean(original_query)\n\
          \    reference = _clean(object_reference)\n    resolution = _clean(resolution_status).lower()\n\
          \n    policy = _clean(knowledge_policy).lower()\n    if policy not in VALID_KNOWLEDGE_POLICIES:\n\
          \        policy = 'required' if _bool(need_knowledge) else 'none'\n\n  \
          \  endpoint = ''\n    payload = {}\n    action = 'none'\n    if _bool(need_crm):\n\
          \        if resolution in ['ambiguous', 'not_found', 'missing'] and reference:\n\
          \            endpoint = 'resolve-crm-object'\n            action = 'resolve_crm_object'\n\
          \            payload = {'objectReference': reference, 'limit': 10}\n   \
          \     elif _clean(task_type) == 'stats_analysis':\n            endpoint\
          \ = 'get-funnel-snapshot'\n            action = 'get_funnel_snapshot'\n\
          \            payload = {}\n        elif object_type == 'customer' and _is_opportunity_relation(relation):\n\
          \            endpoint = 'search-opportunities'\n            action = 'search_opportunities'\n\
          \            payload = {'keyword': object_name or query[:80], 'limit': 10,\
          \ 'includeContextOnUnique': False}\n        elif object_type == 'opportunity'\
          \ and object_id:\n            endpoint = 'get-opportunity-context'\n   \
          \         action = 'get_opportunity_context'\n            payload = {'opportunityId':\
          \ object_id, 'limit': 10}\n        elif object_type == 'customer' and object_id:\n\
          \            endpoint = 'get-customer-context'\n            action = 'get_customer_context'\n\
          \            payload = {'customerId': object_id, 'limit': 10}\n        elif\
          \ _is_opportunity_relation(relation):\n            endpoint = 'search-opportunities'\n\
          \            action = 'search_opportunities'\n            payload = {'keyword':\
          \ object_name or query[:80], 'limit': 10, 'includeContextOnUnique': False}\n\
          \        elif _is_customer_relation(relation):\n            endpoint = 'search-customers'\n\
          \            action = 'search_customers'\n            payload = {'keyword':\
          \ object_name or query[:80], 'limit': 10, 'includeContextOnUnique': False}\n\
          \        elif object_name:\n            endpoint = 'resolve-crm-object'\n\
          \            action = 'resolve_crm_object'\n            payload = {'objectReference':\
          \ object_name, 'limit': 10}\n\n    return {\n        'need_crm': 'true'\
          \ if endpoint else 'false',\n        'need_knowledge': 'true' if policy\
          \ != 'none' else 'false',\n        'knowledge_policy': policy,\n       \
          \ 'knowledge_goal': _clean(knowledge_goal),\n        'need_external': 'true'\
          \ if _bool(need_external) else 'false',\n        'need_attachment': 'true'\
          \ if _bool(need_attachment) else 'false',\n        'crm_action': action,\n\
          \        'crm_tool_url_path': '/' + endpoint if endpoint else '',\n    \
          \    'crm_request_body': json.dumps(payload, ensure_ascii=False),\n    \
          \    'evidence_plan_text': '; '.join([\n            f\"task_type={_clean(task_type)}\"\
          ,\n            f\"crm={action}\",\n            f\"knowledge_policy={policy}\"\
          ,\n            f\"external={_bool(need_external)}\",\n            f\"attachment={_bool(need_attachment)}\"\
          ,\n        ]),\n    }"
