          \        bound = {\n            'objectType': _clean(bound_object_type),\n\
          \            'objectId': _clean(bound_object_id),\n            'objectName':\
          \ _clean(bound_object_name),\n            'source': _clean(bound_object_source)\
          \ or 'page_context',\n        }\n    elif _clean(selected_object_id):\n\
          \        bound = {\n            'objectType': _clean(selected_object_type)\
          \ or 'opportunity',\n            'objectId': _clean(selected_object_id),\n\
          \            'objectName': _clean(selected_object_name),\n            'source':\
          \ 'user_selection',\n        }\n    elif _clean(route_customer_id):\n  \
          \      bound = {\n            'objectType': 'customer',\n            'objectId':\
          \ _clean(route_customer_id),\n            'objectName': '',\n          \
